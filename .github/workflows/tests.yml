---
name: "CI"

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NAMESPACE: stevefulme1
  COLLECTION: rafay

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ansible-lint yamllint
      - run: ansible-lint --nocolor

  sanity:
    name: Sanity (Ansible ${{ matrix.ansible }} / Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - stable-2.16
          - stable-2.18
          - stable-2.20
        python:
          - "3.12"
          - "3.13"
        exclude:
          - ansible: stable-2.16
            python: "3.13"
          - ansible: stable-2.17
            python: "3.13"
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install "https://github.com/ansible/ansible/archive/${{ matrix.ansible }}.tar.gz"
      - name: Sanity tests
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        run: ansible-test sanity -v --color yes --python ${{ matrix.python }}

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ansible-core pytest pytest-mock
      - name: Unit tests
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ -d tests/unit ]; then
            python -m pytest tests/unit/ -v --tb=short
          else
            echo "No unit tests found, skipping"
          fi
