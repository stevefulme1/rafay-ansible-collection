---
- name: Create project for team
  stevefulme1.rafay.rafay_project:
    name: "{{ onboard_team_project_name }}"
    description: "{{ onboard_team_description | default('') }}"
    state: present

- name: Create team group
  stevefulme1.rafay.rafay_group:
    name: "{{ onboard_team_group_name }}"
    roles: "{{ onboard_team_roles }}"
    state: present

- name: Add users to group
  stevefulme1.rafay.rafay_user:
    username: "{{ item.username }}"
    first_name: "{{ item.first_name | default(omit) }}"
    last_name: "{{ item.last_name | default(omit) }}"
    email: "{{ item.email }}"
    groups:
      - "{{ onboard_team_group_name }}"
    state: present
  loop: "{{ onboard_team_members }}"

- name: Create namespaces for team
  stevefulme1.rafay.rafay_namespace:
    name: "{{ item.name }}"
    cluster: "{{ item.cluster }}"
    resource_quota: "{{ item.resource_quota | default(omit) }}"
    labels:
      team: "{{ onboard_team_project_name }}"
    project: "{{ onboard_team_project_name }}"
    state: present
  loop: "{{ onboard_team_namespaces }}"

- name: Configure cost allocation
  stevefulme1.rafay.rafay_cost_profile:
    name: "{{ onboard_team_project_name }}-costs"
    clusters: "{{ onboard_team_namespaces | map(attribute='cluster') | unique | list }}"
    chargeback_group: "{{ onboard_team_chargeback_group | default(onboard_team_project_name) }}"
    project: "{{ onboard_team_project_name }}"
    state: present
  when: onboard_team_enable_cost_tracking | default(true)
...
